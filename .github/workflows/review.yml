name: Auto Review Homework

on:
  pull_request_target:
    branches: [master]
    types: [opened, synchronize, reopened]

jobs:
  review:
    name: Claude Agent Review
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      # 1. Checkout code bài tập của học viên
      - name: Checkout student code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: student-code

      # 1b. Checkout master branch (để đọc class.json mới nhất từ teacher)
      - name: Checkout base repo at master
        uses: actions/checkout@v4
        with:
          ref: master
          path: base-code

      # 1c. Extract subject and course from branch name for labeling
      - name: Extract subject and course from branch
        id: branch_info
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          # Branch format: embedded-linux/K26.1/student-name/session-XX
          SUBJECT=$(echo $BRANCH | cut -d'/' -f1)
          COURSE=$(echo $BRANCH | cut -d'/' -f2)
          echo "subject=$SUBJECT" >> $GITHUB_OUTPUT
          echo "course=$COURSE" >> $GITHUB_OUTPUT

      # 1d. Add labels to PR (subject and course)
      - name: Add labels to PR
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels \
            -d '{"labels":["${{ steps.branch_info.outputs.subject }}","${{ steps.branch_info.outputs.course }}"]}'

      # 2. Setup SSH để clone private repo
      - name: Setup SSH Deploy Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.REVIEWER_DEPLOY_KEY }}

      # 3. Clone private repo chứa agent + skills
      - name: Checkout private reviewer repo
        run: git clone git@github.com:${{ secrets.REVIEWER_REPO }} reviewer-core

      # 4. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic requests --break-system-packages

      # 5. Chạy Claude Agent review
      - name: Run Review Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:         ${{ github.event.pull_request.number }}
          PR_REPO:           ${{ github.repository }}
          PR_BRANCH:         ${{ github.event.pull_request.head.ref }}
          PR_AUTHOR:         ${{ github.event.pull_request.user.login }}
          PR_TITLE:          ${{ github.event.pull_request.title }}
          STUDENT_CODE_PATH: student-code
          BASE_CODE_PATH:    base-code
        run: python reviewer-core/reviewer/review_pr.py
